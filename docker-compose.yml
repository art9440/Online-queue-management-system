version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: online_queue_postgres
    restart: always
    environment:
      POSTGRES_USER: online_queue_db_user
      POSTGRES_PASSWORD: online_queue_db_pass
      POSTGRES_DB: online_queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: